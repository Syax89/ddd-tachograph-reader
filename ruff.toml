# Lint configuration — kept to correctness rules (pyflakes + pycodestyle
# errors): the goal is catching real bugs in CI, not style churn.
target-version = "py310"
line-length = 120

[lint]
select = ["E4", "E7", "E9", "F", "B"]
ignore = [
    "E731",  # lambda assignments are used deliberately in small dispatch maps
]

[lint.per-file-ignores]
"gui_tree.py" = ["E402"]   # imports after the Windows High-DPI setup block
"build.spec" = ["E402", "F821"]  # PyInstaller spec: Analysis/EXE are injected globals
