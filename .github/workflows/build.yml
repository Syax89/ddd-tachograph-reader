name: Build TachoReader

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build with PyInstaller
      run: |
        pyinstaller build.spec

    - name: Generate mock data for smoke test
      run: python tests/integration/generate_mock_ddd.py

    - name: Smoke test bundle (macOS)
      if: runner.os == 'macOS'
      run: |
        ./dist/TachoReader.app/Contents/MacOS/TachoReader --version
        ./dist/TachoReader.app/Contents/MacOS/TachoReader --smoke tests/mock_data/mock_g2_card.ddd

    - name: Smoke test bundle (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      timeout-minutes: 5
      env:
        TACHO_SMOKE_LOG: smoke.log
      # Windowed exe (console=False): no stdout — results go to TACHO_SMOKE_LOG,
      # exit code via WaitForExit with an explicit timeout (never hang CI).
      run: |
        $exe = "dist\TachoReader\TachoReader.exe"
        foreach ($cmd in @(,@('--version')) + @(,@('--smoke', 'tests\mock_data\mock_g2_card.ddd'))) {
          $p = Start-Process -FilePath $exe -ArgumentList $cmd -PassThru
          if (-not $p.WaitForExit(120000)) {
            Get-Process | Where-Object { $_.MainWindowTitle } |
              Format-Table Id, ProcessName, MainWindowTitle
            $p.Kill()
            Write-Error "Smoke test timed out: $cmd"
            if (Test-Path smoke.log) { Get-Content smoke.log }
            exit 1
          }
          if ($p.ExitCode -ne 0) {
            Write-Error "Smoke test failed: $cmd (exit $($p.ExitCode))"
            if (Test-Path smoke.log) { Get-Content smoke.log }
            exit 1
          }
        }
        Get-Content smoke.log

    - name: Diagnose bundle startup (console build, Windows)
      if: failure() && runner.os == 'Windows'
      shell: pwsh
      timeout-minutes: 10
      env:
        TACHO_CONSOLE: '1'
        TACHO_SMOKE_LOG: smoke-console.log
      # The windowed bundle has no stdout: rebuild as a console app so the
      # bootloader and Python errors are visible in the job log.
      run: |
        pyinstaller build.spec --noconfirm --distpath dist-console --workpath build-console
        & dist-console\TachoReader\TachoReader.exe --version
        Write-Host "version exit: $LASTEXITCODE"
        & dist-console\TachoReader\TachoReader.exe --smoke tests\mock_data\mock_g2_card.ddd
        Write-Host "smoke exit: $LASTEXITCODE"
        if (Test-Path smoke-console.log) { Get-Content smoke-console.log }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: TachoReader-${{ matrix.os }}
        path: |
          dist/TachoReader.exe
          dist/TachoReader.app
          dist/TachoReader
