name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Tag must match core/version.py
      run: |
        APP_VERSION=$(python3 -c "from core.utils.version import __version__; print(__version__)")
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match core/utils/version.py ($APP_VERSION)"
          exit 1
        fi

  lint:
    runs-on: ubuntu-latest
    needs: check-version
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Ruff (correctness rules)
      run: |
        pip install -r requirements-dev.txt
        ruff check .
    - name: Mypy
      run: |
        pip install -r requirements-dev.txt
        mypy .

  test:
    runs-on: ubuntu-latest
    needs: [check-version, lint]
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Generate synthetic mock data
      run: python tests/integration/generate_mock_ddd.py
    - name: Run test suite
      run: python -m pytest -q

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Windows executable
      # build.spec is the single source of truth for the bundle
      # (hidden imports, datas, windowed mode, app version).
      run: pyinstaller build.spec

    - name: Generate mock data for smoke test
      run: python tests/integration/generate_mock_ddd.py

    - name: Smoke test bundle
      shell: pwsh
      timeout-minutes: 5
      env:
        TACHO_SMOKE_LOG: smoke.log
      # Windowed exe (console=False): no stdout — results go to TACHO_SMOKE_LOG,
      # exit code via WaitForExit with an explicit timeout (never hang CI).
      run: |
        $exe = "dist\TachoReader\TachoReader.exe"
        foreach ($cmd in @(,@('--version')) + @(,@('--smoke', 'tests\mock_data\mock_g2_card.ddd'))) {
          $p = Start-Process -FilePath $exe -ArgumentList $cmd -PassThru
          if (-not $p.WaitForExit(120000)) {
            Get-Process | Where-Object { $_.MainWindowTitle } |
              Format-Table Id, ProcessName, MainWindowTitle
            $p.Kill()
            Write-Error "Smoke test timed out: $cmd"
            if (Test-Path smoke.log) { Get-Content smoke.log }
            exit 1
          }
          if ($p.ExitCode -ne 0) {
            Write-Error "Smoke test failed: $cmd (exit $($p.ExitCode))"
            if (Test-Path smoke.log) { Get-Content smoke.log }
            exit 1
          }
        }
        Get-Content smoke.log

    - name: Package as zip
      shell: pwsh
      run: |
        Compress-Archive -Path dist/TachoReader/* -DestinationPath TachoReader-${{ github.ref_name }}-windows-x64.zip

    - name: Extract release notes from CHANGELOG
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        awk -v ver="$VERSION" '
          $0 ~ "^## \\[" ver "\\]" {flag=1; next}
          /^## \[/ {flag=0}
          flag' CHANGELOG.md > release_notes.md
        test -s release_notes.md || echo "Release $GITHUB_REF_NAME" > release_notes.md

    - name: Upload to release
      uses: softprops/action-gh-release@v3
      with:
        files: TachoReader-${{ github.ref_name }}-windows-x64.zip
        body_path: release_notes.md

  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build macOS app
      run: pyinstaller build.spec

    - name: Generate mock data for smoke test
      run: python tests/integration/generate_mock_ddd.py

    - name: Smoke test bundle
      run: |
        ./dist/TachoReader.app/Contents/MacOS/TachoReader --version
        ./dist/TachoReader.app/Contents/MacOS/TachoReader --smoke tests/mock_data/mock_g2_card.ddd

    - name: Create DMG
      run: |
        hdiutil create -volname "TachoReader" -srcfolder dist/TachoReader.app -ov -format UDZO TachoReader-${{ github.ref_name }}-macos.dmg

    - name: Extract release notes from CHANGELOG
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        awk -v ver="$VERSION" '
          $0 ~ "^## \\[" ver "\\]" {flag=1; next}
          /^## \[/ {flag=0}
          flag' CHANGELOG.md > release_notes.md
        test -s release_notes.md || echo "Release $GITHUB_REF_NAME" > release_notes.md

    - name: Upload to release
      uses: softprops/action-gh-release@v3
      with:
        files: TachoReader-${{ github.ref_name }}-macos.dmg
        body_path: release_notes.md
