name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Tag must match core/version.py
      run: |
        APP_VERSION=$(python3 -c "from core.version import __version__; print(__version__)")
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match core/version.py ($APP_VERSION)"
          exit 1
        fi

  build-windows:
    runs-on: windows-latest
    needs: check-version
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Windows executable
      # build.spec is the single source of truth for the bundle
      # (hidden imports, datas, windowed mode, app version).
      run: pyinstaller build.spec

    - name: Package as zip
      shell: pwsh
      run: |
        Compress-Archive -Path dist/TachoReader/* -DestinationPath TachoReader-${{ github.ref_name }}-windows-x64.zip

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      with:
        files: TachoReader-${{ github.ref_name }}-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    needs: check-version
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build macOS app
      run: pyinstaller build.spec

    - name: Create DMG
      run: |
        hdiutil create -volname "TachoReader" -srcfolder dist/TachoReader.app -ov -format UDZO TachoReader-${{ github.ref_name }}-macos.dmg

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      with:
        files: TachoReader-${{ github.ref_name }}-macos.dmg
