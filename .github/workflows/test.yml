name: Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Ruff (correctness rules — see ruff.toml)
      run: |
        pip install ruff
        ruff check .
    - name: Mypy (see mypy.ini)
      run: |
        pip install mypy
        mypy .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 dropped: EOL Oct 2025 and pytest 9 requires >= 3.10.
        python-version: ['3.10', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Generate synthetic mock data
      # Real DDD files are not versioned (personal data); tests that need
      # them skip on their own. Synthetic mocks exercise the decoders.
      run: python tests/generate_mock_ddd.py

    - name: Run test suite
      run: pytest -q
